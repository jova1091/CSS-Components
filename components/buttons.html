<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script>
    (function() {
      var root = location.pathname.startsWith('/CSS-Components') ? '/CSS-Components' : '';
      document.write('<base href="' + root + '/">');
      document.write('<link rel="icon" type="image/svg+xml" href="' + root + '/favicon.svg">');
      document.write('<link rel="stylesheet" href="' + root + '/assets/css/pages/buttons.css">');
    })();
  </script>
  <title>CSS Components — Botones</title>
</head>
<body>
  <a href="#main" class="skip-link">Saltar al contenido principal</a>
  <main id="main">
    <section id="buttons" class="container">
      <article class="row">
        <div class="col-12">
          <h4>Button Variants</h4>
          <p>Solid buttons:</p>
          <div class="button-showcase">
            <button class="btn">Primary</button>
            <button class="btn btn-secondary">Secondary</button>
            <button class="btn btn-success">Success</button>
            <button class="btn btn-danger">Danger</button>
            <button class="btn btn-warning">Warning</button>
            <button class="btn btn-info">Info</button>
          </div>
          <p class="mt-3">Outline buttons:</p>
          <div class="button-showcase">
            <button class="btn btn-outline-primary">Outline Primary</button>
            <button class="btn btn-outline-secondary">Outline Secondary</button>
            <button class="btn btn-outline-success">Outline Success</button>
            <button class="btn btn-outline-danger">Outline Danger</button>
            <button class="btn btn-outline-warning">Outline Warning</button>
            <button class="btn btn-outline-info">Outline Info</button>
          </div>
          <hr class="my-4">
          <h4>Button Sizes</h4>
          <div class="button-showcase align-items-center">
            <button class="btn btn-primary btn-lg">Large button</button>
            <button class="btn btn-secondary">Default button</button>
            <button class="btn btn-success btn-sm">Small button</button>
          </div>
          <hr class="my-4">
          <h4>Block Button</h4>
          <div class="row">
            <div class="col-6">
              <button class="btn btn-primary btn-block">Block level button</button>
            </div>
          </div>
          <hr class="my-4">
          <h4>Disabled State</h4>
          <div class="button-showcase">
            <button class="btn btn-lg btn-primary" disabled>Disabled button</button>
            <a href="#" class="btn btn-secondary disabled" role="button" aria-disabled="true">Disabled link</a>
          </div>
          <hr class="my-4">
          <h4>With icon</h4>
          <div class="button-showcase">
            <button class="btn btn-icon">
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" fill="currentColor">
                <path d="M8 15A7 7 0 1 1 8 1a7 7 0 0 1 0 14Zm0-2A5 5 0 1 0 8 3a5 5 0 0 0 0 10Z" />
              </svg>
              Icon Left
            </button>
            <button class="btn btn-secondary btn-icon">
              Icon Right
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" fill="currentColor">
                <path d="M8 15A7 7 0 1 1 8 1a7 7 0 0 1 0 14Zm0-2A5 5 0 1 0 8 3a5 5 0 0 0 0 10Z" />
              </svg>
            </button>
          </div>
          <hr class="my-4">
          <h4>Link Buttons</h4>
          <div class="button-showcase align-items-center">
            <button class="btn btn-link btn-lg">Large link</button>
            <button class="btn btn-link">Default link</button>
            <button class="btn btn-link btn-sm">Small link</button>
            <button class="btn btn-link" disabled>Disabled link</button>
            <button class="btn btn-link btn-icon btn-sm">
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" fill="currentColor">
                <path fill-rule="evenodd" d="M8.22 2.53a.75.75 0 0 1 1.06 0l4.25 4.25a.75.75 0 0 1 0 1.06l-4.25 4.25a.75.75 0 0 1-1.06-1.06L11.94 8 8.22 4.28a.75.75 0 0 1 0-1.06Z" clip-rule="evenodd" />
                <path fill-rule="evenodd" d="M3.22 2.53a.75.75 0 0 1 1.06 0l4.25 4.25a.75.75 0 0 1 0 1.06l-4.25 4.25a.75.75 0 0 1-1.06-1.06L6.94 8 3.22 4.28a.75.75 0 0 1 0-1.06Z" clip-rule="evenodd" />
              </svg>
              Small link with Icon
            </button>
          </div>
          <hr class="my-4">
          <h4>Button Group</h4>
          <p>Horizontal group:</p>
          <div class="button-showcase">
            <fieldset class="btn-group" role="group" aria-label="Horizontal button group">
              <button type="button" class="btn btn-primary">Left</button>
              <button type="button" class="btn btn-primary">Middle</button>
              <button type="button" class="btn btn-primary">Right</button>
            </fieldset>
            <fieldset class="btn-group" role="group" aria-label="Horizontal outlined button group">
              <button type="button" class="btn btn-outline-secondary">Left</button>
              <button type="button" class="btn btn-outline-secondary">Middle</button>
              <button type="button" class="btn btn-outline-secondary">Right</button>
            </fieldset>
          </div>
          <p class="mt-3">Horizontal group with <code>.btn-block</code>:</p>
          <fieldset class="btn-group btn-block" role="group" aria-label="Horizontal block button group">
            <button type="button" class="btn btn-success">Left</button>
            <button type="button" class="btn btn-success">Middle</button>
            <button type="button" class="btn btn-success">Right</button>
          </fieldset>
          <p class="mt-3">Sizing:</p>
          <div class="button-showcase align-items-start">
            <fieldset class="btn-group btn-group-lg" role="group" aria-label="Large button group">
              <button type="button" class="btn btn-outline-primary">Large</button>
              <button type="button" class="btn btn-outline-primary">Large</button>
            </fieldset>
            <fieldset class="btn-group" role="group" aria-label="Default button group">
              <button type="button" class="btn btn-outline-primary">Default</button>
              <button type="button" class="btn btn-outline-primary">Default</button>
            </fieldset>
            <fieldset class="btn-group btn-group-sm" role="group" aria-label="Small button group">
              <button type="button" class="btn btn-outline-primary">Small</button>
              <button type="button" class="btn btn-outline-primary">Small</button>
            </fieldset>
            <fieldset class="btn-group btn-group-vertical btn-group-lg" role="group" aria-label="Large vertical button group">
              <button type="button" class="btn btn-info">Large</button>
              <button type="button" class="btn btn-info">Large</button>
            </fieldset>
          </div>
          <div class="row mt-4">
            <div class="col-12">
              <p>Vertical group:</p>
              <fieldset class="btn-group btn-group-vertical" role="group" aria-label="Vertical button group">
                <button type="button" class="btn btn-danger">Top</button>
                <button type="button" class="btn btn-danger">Middle</button>
                <button type="button" class="btn btn-danger">Bottom</button>
              </fieldset>
            </div>
            <div class="col-12 mt-3">
              <p>Vertical group with <code>.btn-block</code>:</p>
              <fieldset class="btn-group btn-group-vertical btn-block" role="group" aria-label="Vertical block button group">
                <button type="button" class="btn btn-danger">Top</button>
                <button type="button" class="btn btn-danger">Middle</button>
                <button type="button" class="btn btn-danger">Bottom</button>
              </fieldset>
            </div>
          </div>
        </div>
      </article>
    </section>
  </main>

  <script type="module">
    import injectNav, { injectFooter } from "./assets/js/nav-injector.js";
    await injectNav();
    await injectFooter();
    import("./assets/js/pages/buttons.js");
  </script>
</body>
</html>
